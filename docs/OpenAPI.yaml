openapi: 3.1.0
info: 
  title: Course Registration System - OpenAPI 3.1
  description: |-
    This is the Course Registration System developed by Group Delta for the CMSC495 Computer Science Capstone Project.
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  version: 1.0.0
externalDocs:
  description: Read the README.md file in the GitHub repository for more information.
  url: https://github.com/avraham-adi/cmsc495registrationsystem/tree/main
servers:
  - url: http://127.0.0.1:3000
tags:
  - name: auth
    description: Authentication and token generation
    externalDocs:
      description: Read More
      url: https://github.com/avraham-adi/cmsc495registrationsystem/tree/main
  - name: admin
    description: Admin operations
    externalDocs:
      description: Read More
      url: https://github.com/avraham-adi/cmsc495registrationsystem/tree/main
  - name: course
    description: Course operations
    externalDocs:
      description: Read More
      url: https://github.com/avraham-adi/cmsc495registrationsystem/tree/main
  - name: prerequisite
    description: Prerequisite operations
    externalDocs:
      description: Read More
      url: https://github.com/avraham-adi/cmsc495registrationsystem/tree/main
  - name: semester
    description: Semester operations
    externalDocs:
      description: Read More
      url: https://github.com/avraham-adi/cmsc495registrationsystem/tree/main
  - name: section
    description: Section operations and waitlist access codes
    externalDocs:
      description: Read More
      url: https://github.com/avraham-adi/cmsc495registrationsystem/tree/main
  - name: enrollment
    description: Enrollment operations
    externalDocs:
      description: Read More
      url: https://github.com/avraham-adi/cmsc495registrationsystem/tree/main
paths:
  /api/health:
    get:
      tags:
        - auth
      summary: Health check
      description: Returns a simple service health message.
      operationId: getHealth
      responses:
        '200':
          description: API health returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Health'
  /user/login:
    post:
      tags:
        - auth
      summary: Log in a user
      description: Authenticate a user, create a server-side session, and set an HttpOnly session cookie.
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login completed successfully and a session cookie was issued.
          headers:
            Set-Cookie:
              description: HttpOnly session cookie for subsequent authenticated requests.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Login'
        '400':
          description: Invalid or missing login request body
        '401':
          description: Invalid email and/or password
  /user/logout:
    get:
      tags:
        - auth
      summary: Log out the current user
      description: End the current authenticated session.
      operationId: logout
      parameters: []
      responses:
        '200':
          description: Logout completed successfully and the session cookie was cleared.
          headers:
            Set-Cookie:
              description: Expired session cookie clearing the authenticated session.
              schema:
                type: string
        '401':
          description: Invalid or missing session
      security:
        - SessionAuth: []
  /user/me:
    get:
      tags:
        - auth
      summary: Get the current user
      description: Return the currently authenticated user for the active server-side session.
      operationId: getSelf
      responses:
        '200':
          description: Current user returned successfully for the active session.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUser'
        '401':
          description: Invalid or missing session
        '404':
          description: User not found
      security:
        - SessionAuth: []
    patch:
      tags:
        - auth
      summary: Change the current user's password
      description: Update the password for the authenticated user within the active session.
      operationId: updPass
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordChangeRequest'
      responses:
        '200':
          description: Password changed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUser'
        '400':
          description: Invalid password or request body
        '401':
          description: Invalid or missing session
        '404':
          description: User not found
      security:
        - SessionAuth: []
    put:
      tags:
        - auth
      summary: Update the current user
      description: Update the authenticated user's profile information within the active session.
      operationId: updUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
      responses:
        '200':
          description: Updated user information returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUser'
        '400':
          description: Invalid request body
        '401':
          description: Invalid or missing session
        '404':
          description: User not found
        '409':
          description: User with this email already exists
      security:
        - SessionAuth: []
  /admin:
    get:
      tags:
        - admin
      summary: List users
      description: Return a paginated list of users. Requires role ADMIN. Role is verified server-side for the session user. If the authenticated user is still on first login, access is blocked until they change their password.
      operationId: getUsers
      parameters:
        - name: page
          in: query
          description: Page number, default = 1
          required: false
          schema:
            type: integer
        - name: limit
          in: query
          description: Items per page, default is 10
          required: false
          schema:
            type: integer
        - name: search
          in: query
          description: Search term
          required: false
          schema:
            type: string
        - name: role
          in: query
          description: "Role filter: ADMIN, STUDENT, or PROFESSOR"
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Paginated user list returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserMeta'
        '400':
          description: Invalid role filter
        '401':
          description: Invalid or missing session
        '403':
          description: "Forbidden: ADMIN role required, or password change required on first login"
      security:
        - SessionAuth: []
    post:
      tags:
        - admin
      summary: Create a user
      description: Create a new user account. Requires role ADMIN. Role is verified server-side for the session user. If the authenticated user is still on first login, access is blocked until they change their password.
      operationId: addUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUserCreateRequest'
      responses:
        '201':
          description: User created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Invalid request body
        '401':
          description: Invalid or missing session
        '403':
          description: "Forbidden: ADMIN role required, or password change required on first login"
        '409':
          description: User with this email already exists
      security:
        - SessionAuth: []
  /admin/{id}:
    get:
      tags:
        - admin
      summary: Get a user by ID
      description: Return a user by ID. Requires role ADMIN. Role is verified server-side for the session user. If the authenticated user is still on first login, access is blocked until they change their password.
      operationId: getUser
      parameters:
        - name: id
          in: path
          description: User ID
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: User details returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Invalid or missing session
        '403':
          description: "Forbidden: ADMIN role required, or password change required on first login"
        '404':
          description: User not found
      security:
        - SessionAuth: []
    delete:
      tags:
        - admin
      summary: Delete a user
      description: Delete a user by ID. Requires role ADMIN. Role is verified server-side for the session user. If the authenticated user is still on first login, access is blocked until they change their password.
      operationId: rmvUser
      parameters:
        - name: id
          in: path
          description: User ID
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: User removed successfully.
        '401':
          description: Invalid or missing session
        '403':
          description: "Forbidden: ADMIN role required, password change required on first login, or admins cannot remove their own account or the last remaining admin"
        '404':
          description: User not found
      security:
        - SessionAuth: []
  /admin/{id}/role:
    put:
      tags:
        - admin
      summary: Update a user's role
      description: Set the role and role details for a user. Requires role ADMIN. Role is verified server-side for the session user. If the authenticated user is still on first login, access is blocked until they change their password.
      operationId: setRole
      parameters:
        - name: id
          in: path
          description: User ID
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUserRoleUpdateRequest'
      responses:
        '200':
          description: User role updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Invalid user type or request body
        '401':
          description: Invalid or missing session
        '403':
          description: "Forbidden: ADMIN role required, password change required on first login, or admins cannot remove their own admin role or the last remaining admin role"
        '404':
          description: User not found
      security:
        - SessionAuth: []
  /course:
    get:
      tags:
        - course
      summary: List courses
      description: Return a paginated list of courses.
      operationId: getCourses
      parameters:
        - name: page
          in: query
          description: Page number, default = 1
          required: false
          schema:
            type: integer
        - name: limit
          in: query
          description: Items per page, default is 10
          required: false
          schema:
            type: integer
        - name: search
          in: query
          description: Search term
          required: false
          schema:
            type: string
        - name: subject
          in: query
          description: Subject code filter
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Paginated course list returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseMeta'
        '400':
          description: Invalid query parameters
    post:
      tags:
        - course
      summary: Create a course
      description: Create a new course. Requires role ADMIN. Role is verified server-side for the session user. If the authenticated user is still on first login, access is blocked until they change their password.
      operationId: addCourse
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CourseWriteRequest'
      responses:
        '201':
          description: Course created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Course'
        '400':
          description: Invalid request body
        '401':
          description: Invalid or missing session
        '403':
          description: "Forbidden: ADMIN role required, or password change required on first login"
        '409':
          description: Course with this course code already exists
        '500':
          description: Failed to retrieve newly created course
      security:
        - SessionAuth: []
  /course/{id}:
    get:
      tags:
        - course
      summary: Get a course by ID
      description: Return course details for a specific course.
      operationId: getCourse
      parameters:
        - name: id
          in: path
          description: Course ID
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Course details returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Course'
        '404':
          description: Course not found
    put:
      tags:
        - course
      summary: Update a course
      description: Update course details. Requires role ADMIN. Role is verified server-side for the session user. If the authenticated user is still on first login, access is blocked until they change their password.
      operationId: updCourse
      parameters:
        - name: id
          in: path
          description: Course ID
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CourseWriteRequest'
      responses:
        '200':
          description: Course updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Course'
        '400':
          description: Invalid request body
        '401':
          description: Invalid or missing session
        '403':
          description: "Forbidden: ADMIN role required, or password change required on first login"
        '404':
          description: Course not found
        '409':
          description: Course with this course code already exists
        '500':
          description: Failed to retrieve updated course
      security:
        - SessionAuth: []
    delete:
      tags:
        - course
      summary: Delete a course
      description: Delete a course by ID. Requires role ADMIN. Role is verified server-side for the session user. If the authenticated user is still on first login, access is blocked until they change their password.
      operationId: rmvCourse
      parameters:
        - name: id
          in: path
          description: Course ID
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Course removed successfully.
        '401':
          description: Invalid or missing session
        '403':
          description: "Forbidden: ADMIN role required, or password change required on first login"
        '404':
          description: Course not found
        '400':
          description: Cannot delete a course that has scheduled sections
      security:
        - SessionAuth: []
  /prerequisite:
    post:
      tags:
        - prerequisite
      summary: Create a prerequisite
      description: Add a prerequisite relationship to a course. Requires role ADMIN. Role is verified server-side for the session user. If the authenticated user is still on first login, access is blocked until they change their password.
      operationId: addPrerequisite
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrerequisiteCreateRequest'
      responses:
        '201':
          description: Prerequisite created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Prerequisite'
        '400':
          description: Invalid request body or a course cannot be its own prerequisite
        '401':
          description: Invalid or missing session
        '403':
          description: "Forbidden: ADMIN role required, or password change required on first login"
        '404':
          description: One or more courses not found
        '409':
          description: Prerequisite relationship already exists or would create a cycle
        '500':
          description: Failed to add prerequisite relationship
      security:
        - SessionAuth: []
  /prerequisite/{id}:
    get:
      tags:
        - prerequisite
      summary: List course prerequisites
      description: Return the prerequisites for a course.
      operationId: getPrerequisites
      parameters:
        - name: id
          in: path
          description: Course ID
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Course prerequisites returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrerequisiteArray'
        '404':
          description: Course not found
  /prerequisite/{cId}/{pId}:
    delete:
      tags:
        - prerequisite
      summary: Delete a prerequisite
      description: Remove a prerequisite relationship from a course. Requires role ADMIN. Role is verified server-side for the session user. If the authenticated user is still on first login, access is blocked until they change their password.
      operationId: rmvPrerequisite
      parameters:
        - name: cId
          in: path
          description: Course ID
          required: true
          schema:
            type: integer
        - name: pId
          in: path
          description: Prerequisite course ID
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Prerequisite removed successfully.
        '401':
          description: Invalid or missing session
        '403':
          description: "Forbidden: ADMIN role required, or password change required on first login"
        '404':
          description: Prerequisite relationship not found
      security:
        - SessionAuth: []
  /semester:
    get:
      tags:
        - semester
      summary: List semesters
      description: Return all semesters.
      operationId: getSemesters
      parameters:
      responses:
        '200':
          description: Semester list returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SemesterArray'
    post:
      tags:
        - semester
      summary: Create a semester
      description: Create a new semester. Requires role ADMIN. Role is verified server-side for the session user. If the authenticated user is still on first login, access is blocked until they change their password.
      operationId: addSemester
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SemesterWriteRequest'
      responses:
        '201':
          description: Semester created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Semester'
        '400':
          description: Invalid request body
        '401':
          description: Invalid or missing session
        '403':
          description: "Forbidden: ADMIN role required, or password change required on first login"
        '409':
          description: Semester already exists
      security:
        - SessionAuth: []
  /semester/{id}:
    get:
      tags:
        - semester
      summary: Get a semester by ID
      description: Return a semester by ID.
      operationId: getSemester
      parameters:
        - name: id
          in: path
          description: Semester ID
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Semester details returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Semester'
        '404':
          description: Semester not found
    delete:
      tags:
        - semester
      summary: Delete a semester
      description: Delete a semester by ID. Requires role ADMIN. Role is verified server-side for the session user. If the authenticated user is still on first login, access is blocked until they change their password.
      operationId: rmvSemester
      parameters:
        - name: id
          in: path
          description: Semester ID
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Semester removed successfully.
        '400':
          description: Cannot delete a semester that has scheduled sections
        '401':
          description: Invalid or missing session
        '403':
          description: "Forbidden: ADMIN role required, or password change required on first login"
        '404':
          description: Semester not found
      security:
        - SessionAuth: []
  /section:
    get:
      tags:
        - section
      summary: List sections
      description: Return a paginated list of sections.
      operationId: getSections
      parameters:
        - name: page
          in: query
          description: Page number, default = 1
          required: false
          schema:
            type: integer
        - name: limit
          in: query
          description: Items per page, default is 10
          required: false
          schema:
            type: integer
        - name: search
          in: query
          description: Search term
          required: false
          schema:
            type: string
        - name: crsId
          in: query
          description: Course ID, default = null
          required: false
          schema:
            type: integer
        - name: semId
          in: query
          description: Semester ID, default = null
          required: false
          schema:
            type: integer
        - name: profId
          in: query
          description: Professor ID, default = null
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Paginated section list returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SectionMeta'
        '400':
          description: Invalid query parameters
  /section/{cId}:
    post:
      tags:
        - section
      summary: Create a section
      description: Create a new section for a course. Requires role ADMIN. Role is verified server-side for the session user. If the authenticated user is still on first login, access is blocked until they change their password.
      operationId: addSection
      parameters:
        - name: cId
          in: path
          description: Course ID
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SectionWriteRequest'
      responses:
        '201':
          description: Section created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Section'
        '400':
          description: Invalid request body
        '401':
          description: Invalid or missing session
        '403':
          description: "Forbidden: ADMIN role required, or password change required on first login"
        '404':
          description: Course, semester, or professor not found
        '500':
          description: Failed to retrieve newly created section
      security:
        - SessionAuth: []
  /section/{id}:
    get:
      tags:
        - section
      summary: Get a section by ID
      description: Return section details for a specific section.
      operationId: getSection
      parameters:
        - name: id
          in: path
          description: Section ID
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Section details returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Section'
        '404':
          description: Section not found
    put:
      tags:
        - section
      summary: Update a section
      description: Update section details. Requires role ADMIN. Role is verified server-side for the session user. If the authenticated user is still on first login, access is blocked until they change their password.
      operationId: updSection
      parameters:
        - name: id
          in: path
          description: Section ID
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SectionWriteRequest'
      responses:
        '200':
          description: Section updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Section'
        '400':
          description: Invalid request body or section capacity below current enrollment
        '401':
          description: Invalid or missing session
        '403':
          description: "Forbidden: ADMIN role required, or password change required on first login"
        '404':
          description: Section, semester, or professor not found
        '500':
          description: Failed to retrieve updated section
      security:
        - SessionAuth: []
    delete:
      tags:
        - section
      summary: Delete a section
      description: Delete a section by ID. Requires role ADMIN. Role is verified server-side for the session user. If the authenticated user is still on first login, access is blocked until they change their password.
      operationId: rmvSection
      parameters:
        - name: id
          in: path
          description: Section ID
          required: true
          schema: 
            type: integer
      responses:
        '200':
          description: Section removed successfully.
        '400':
          description: Cannot delete a section that has enrollments
        '401':
          description: Invalid or missing session
        '403':
          description: "Forbidden: ADMIN role required, or password change required on first login"
        '404':
          description: Section not found
      security:
        - SessionAuth: []
  /section/{id}/access-codes:
    get:
      tags:
        - section
      summary: List access codes
      description: Return access codes for a section. Requires role ADMIN or PROFESSOR. Role is verified server-side for the session user. Professors may only access their own sections. If the authenticated user is still on first login, access is blocked until they change their password.
      operationId: getAcCodes
      parameters:
        - name: id
          in: path
          description: Section ID
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Access codes returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessCode'
        '401':
          description: Invalid or missing session
        '403':
          description: "Forbidden: ADMIN role required, PROFESSOR for the specified section, or password change required on first login"
        '404':
          description: Section not found
      security:
        - SessionAuth: []
    post:
      tags:
        - section
      summary: Generate access codes
      description: Generate additional access codes for a section and return only the newly generated code pairs. Requires role ADMIN or PROFESSOR. Role is verified server-side for the session user. Professors may only manage their own sections. If the authenticated user is still on first login, access is blocked until they change their password.
      operationId: genAcCodes
      parameters:
        - name: id
          in: path
          description: Section ID
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccessCodeGenerateRequest'
      responses:
        '200':
          description: New access codes generated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessCode'
        '400':
          description: Invalid request body
        '401':
          description: Invalid or missing session
        '403':
          description: "Forbidden: ADMIN role required, PROFESSOR for the specified section, or password change required on first login"
        '404':
          description: Section not found
      security:
        - SessionAuth: []
    delete:
      tags:
        - section
      summary: Revoke access codes
      description: Revoke selected access codes for a section. Requires role ADMIN or PROFESSOR. Role is verified server-side for the session user. Professors may only manage their own sections. If the authenticated user is still on first login, access is blocked until they change their password.
      operationId: revAcCodes
      parameters:
        - name: id
          in: path
          description: Section ID
          required: true
          schema: 
            type: integer
        - name: codes
          in: query
          description: Comma-separated access codes to revoke.
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Access codes revoked successfully.
        '400':
          description: Invalid query parameters
        '401':
          description: Invalid or missing session
        '403':
          description: "Forbidden: ADMIN role required, PROFESSOR for the specified section, or password change required on first login"
        '404':
          description: Section not found
      security:
        - SessionAuth: []
  /enrollment:
    post:
      tags:
        - enrollment
      summary: Create an enrollment
      description: Create a new enrollment record. Requires role STUDENT or ADMIN. Role is verified server-side for the session user. Students may only manage their own enrollments. If the authenticated user is still on first login, access is blocked until they change their password.
      operationId: addEnrollment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnrollmentCreateRequest'
      responses:
        '201':
          description: Enrollment created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Enrollment'
        '400':
          description: Invalid request body or access code
        '401':
          description: Invalid or missing session
        '403':
          description: "Forbidden: STUDENT or ADMIN role required, or password change required on first login"
        '404':
          description: Student or section not found
        '409':
          description: Prerequisites not met, student already enrolled, or section is full
      security:
        - SessionAuth: []
  /enrollment/{id}:
    get:
      tags:
        - enrollment
      summary: Get an enrollment by ID
      description: Return enrollment details for a specific enrollment. Requires role STUDENT or ADMIN. Role is verified server-side for the session user. Students may only view their own enrollments. If the authenticated user is still on first login, access is blocked until they change their password.
      operationId: getEnrollment
      parameters:
        - name: id
          in: path
          description: Enrollment ID
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Enrollment details returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Enrollment'
        '401':
          description: Invalid or missing session
        '403':
          description: "Forbidden: STUDENT or ADMIN role required, password change required on first login, and students may only access their own enrollments"
        '404':
          description: Enrollment not found
      security:
        - SessionAuth: []
    put:
      tags:
        - enrollment
      summary: Update an enrollment
      description: Update enrollment details or status. Requires role STUDENT or ADMIN. Role is verified server-side for the session user. Students may only manage their own enrollments. If the authenticated user is still on first login, access is blocked until they change their password.
      operationId: updEnrollment
      parameters:
        - name: id
          in: path
          description: Enrollment ID
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnrollmentUpdateRequest'
      responses:
        '200':
          description: Enrollment updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Enrollment'
        '400':
          description: Invalid request body, status transition, or access code
        '401':
          description: Invalid or missing session
        '403':
          description: "Forbidden: STUDENT or ADMIN role required, password change required on first login, and students may only update their own enrollments"
        '404':
          description: Enrollment or section not found
        '409':
          description: Student already enrolled, prerequisites not met, or section is full
      security:
        - SessionAuth: []
    delete:
      tags:
        - enrollment
      summary: Delete an enrollment
      description: Delete an enrollment by ID. Requires role ADMIN. Role is verified server-side for the session user. If the authenticated user is still on first login, access is blocked until they change their password.
      operationId: rmvEnrollment
      parameters:
        - name: id
          in: path
          description: Enrollment ID
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Enrollment removed successfully.
        '401':
          description: Invalid or missing session
        '403':
          description: "Forbidden: ADMIN role required, or password change required on first login"
        '404':
          description: Enrollment not found
      security:
        - SessionAuth: []

components:
  securitySchemes:
    SessionAuth:
      type: apiKey
      in: cookie
      name: sid
      description: HttpOnly session cookie containing a session identifier. The server resolves the user from the session and verifies role server-side for restricted operations.
  schemas:
    Health:
      type: object
      required:
        - message
      properties:
        message:
          type: string
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
    PasswordChangeRequest:
      type: object
      required:
        - password
      properties:
        password:
          type: string
          format: password
    User:
      type: object
      properties:
        id:
          type: integer
          format: int32
        name:
          type: string
        email:
          type: string
          format: email
        first_login:
          type: boolean
        role:
          type: string
        role_id:
          type: integer
        role_details:
          type: string
    UserUpdateRequest:
      type: object
      required:
        - name
        - email
      properties:
        name:
          type: string
        email:
          type: string
          format: email
    AdminUserCreateRequest:
      type: object
      required:
        - name
        - email
        - detail
        - type
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        detail:
          type: string
        type:
          type: string
          enum:
            - ADMIN
            - STUDENT
            - PROFESSOR
    AdminUserRoleUpdateRequest:
      type: object
      required:
        - detail
        - type
      properties:
        detail:
          type: string
        type:
          type: string
          enum:
            - ADMIN
            - STUDENT
            - PROFESSOR
    Login:
      description: Login response containing the authenticated user. The server also sets a session cookie.
      type: object
      properties:
        message:
          type: string
        firstLogin:
          type: boolean
        User:
          $ref: '#/components/schemas/User'
    AuthUser:
      description: Authenticated user response for a valid server-side session.
      type: object
      properties:
        User:
          $ref: '#/components/schemas/User'
    UserArray:
      type: array
      items:
        type: object
        properties:
          User:
            $ref: '#/components/schemas/User'
    UserMeta:
      type: object
      properties:
        User:
          $ref: '#/components/schemas/UserArray'
        Meta:
          $ref: '#/components/schemas/Meta'
    Meta:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer
    Course:
      type: object
      properties:
        course_id:
          type: integer
        course_code:
          type: string
        title:
          type: string
        description:
          type: string
        credits:
          type: integer
        subject:
          type: string
    CourseWriteRequest:
      type: object
      required:
        - code
        - title
        - desc
        - cred
      properties:
        code:
          type: string
        title:
          type: string
        desc:
          type: string
        cred:
          type: integer
    CourseArray:
      type: array
      items:
        type: object
        properties:
          Course:
            $ref: '#/components/schemas/Course'
    CourseMeta:
      type: object
      properties:
        Course:
          $ref: '#/components/schemas/CourseArray'
        Meta:
          $ref: '#/components/schemas/Meta'
    Prerequisite:
      type: object
      properties:
        courseId:
          type: integer
        courseCode:
          type: string
        title:
          type: string
    PrerequisiteCreateRequest:
      type: object
      required:
        - cId
        - pId
      properties:
        cId:
          type: integer
        pId:
          type: integer
    PrerequisiteArray:
      type: array
      items:
        type: object
        properties:
          Prerequisite:
            $ref: '#/components/schemas/Prerequisite'
    Semester:
      type: object
      properties:
        semester_id:
          type: integer
        term:
          type: string
        year:
          type: integer
    SemesterWriteRequest:
      type: object
      required:
        - term
        - year
      properties:
        term:
          type: string
        year:
          type: integer
    SemesterArray:
      type: array
      items:
        type: object
        properties:
          Semester:
            $ref: '#/components/schemas/Semester'
    Section:
      type: object
      properties:
        section_id:
          type: integer
        course_id:
          type: integer
        semester_id:
          type: integer
        professor_id:
          type: integer
        capacity:
          type: integer
        days:
          type: string
          description: Meeting-day code string such as MWF or TR, or `async` for asynchronous classes.
        start_time:
          type: string
          description: Time of day in HH:MM:SS format, or an empty string for asynchronous classes.
          pattern: '^(\d{2}:\d{2}:\d{2})?$'
        end_time:
          type: string
          description: Time of day in HH:MM:SS format, or an empty string for asynchronous classes.
          pattern: '^(\d{2}:\d{2}:\d{2})?$'
    SectionWriteRequest:
      type: object
      required:
        - semId
        - profId
        - capacity
      description: Section write payload. `startTm` and `endTm` must either both be present or both be omitted, and `startTm` must be earlier than `endTm`.
      properties:
        semId:
          type: integer
        profId:
          type: integer
        capacity:
          type: integer
        days:
          type: string
          description: Optional meeting-day code string such as MWF or TR. Omit for asynchronous classes.
        startTm:
          type: string
          description: Optional time of day in HH:MM:SS format. If provided, `endTm` must also be provided. Omit both for asynchronous classes.
          pattern: '^\d{2}:\d{2}:\d{2}$'
        endTm:
          type: string
          description: Optional time of day in HH:MM:SS format. If provided, `startTm` must also be provided and `endTm` must be later than `startTm`. Omit both for asynchronous classes.
          pattern: '^\d{2}:\d{2}:\d{2}$'
    SectionArray:
      type: array
      items:
        type: object
        properties:
          Section:
            $ref: '#/components/schemas/Section'
    SectionMeta:
      type: object
      properties:
        Section:
          $ref: '#/components/schemas/SectionArray'
        Meta:
          $ref: '#/components/schemas/Meta'
    Enrollment:
      type: object
      properties:
        enrollment_id:
          type: integer
        student_id:
          type: integer
        section_id:
          type: integer
        status:
          type: string
          enum:
            - enrolled
            - waitlisted
            - dropped
            - completed
    EnrollmentCreateRequest:
      type: object
      required:
        - secId
        - stuId
        - code
      properties:
        secId:
          type: integer
        stuId:
          type: integer
        code:
          type: string
          description: Access code required to enroll in the section.
    EnrollmentUpdateRequest:
      type: object
      required:
        - status
        - code
      properties:
        status:
          type: string
          enum:
            - enrolled
            - waitlisted
            - dropped
            - completed
        code:
          type: string
          description: Access code used when promoting a waitlisted enrollment into enrolled.
    AccessCodeGenerateRequest:
      type: object
      required:
        - numCodes
      properties:
        numCodes:
          type: integer
          minimum: 1
          maximum: 25
    AccessCode:
      type: object
      description: >
        Dynamic access-code map for a section. Keys appear in pairs:
        `codeN` stores the code value and `codeN_used` stores whether that same
        code has been used. The object may contain any number of these pairs.
      additionalProperties:
        oneOf:
          - type: string
          - type: boolean
      properties:
        code#:
          type: string
          examples:
            - A3F1-9C4B
        code#_used:
          type: boolean
      examples:
        - code1: A3F1-9C4B
          code1_used: false
          code2: 7D2E-1A8F
          code2_used: false
          code3: C0B7-5E92
          code3_used: false
